<source>
  @type tail
  path /var/log/kafka/*.log  # Adjust this path to match Kafka logs directory
  pos_file /fluentd/log/kafka-log.pos
  tag kafka.logs
  <parse>
    @type none
  </parse>
</source>

<match kafka.logs>
  @type elasticsearch
  host es01  # Replace with your Elasticsearch host
  port 9200
  index_name kafka-logs-index
  logstash_format true
  flush_interval 5s
</match>
