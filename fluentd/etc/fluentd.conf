<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<match airflow.logs.**>
  @type elasticsearch
  host es01
  port 9200
  index_name airflow-logs-index
  logstash_format true
  logstash_prefix fluentd-airflow
  flush_interval 5s
</match>

<match *.**>
  @type copy
  <store>
    @type elasticsearch
    host es01
    port 9200
    logstash_format true
    logstash_prefix fluentd
    logstash_dateformat %Y%m%d
    include_tag_key true
    tag_key @log_name
    flush_interval 5s
  </store>

  <store>
    @type stdout
  </store>
</match>
