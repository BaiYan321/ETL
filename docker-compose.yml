services:
  airflow:
    depends_on:
      - postgres
      - spark-master
    build:
      context: .
      args:
        AIRFLOW_VERSION: "2.9.3"
        AIRFLOW_PYTHON_VERSION: "3.11"
      dockerfile: Dockerfile.airflow
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__DAGS_FOLDER: "/airflow/dags"
      AIRFLOW__CORE__PLUGINS_FOLDER: "/airflow/plugins"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: "rRM_xazRD5Z0m7buczl11_dMgZZ_bJKF1UgKzrU9ax0="
      CONNECTION_CHECK_MAX_COUNT: "0"
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    volumes:
      - ./airflow:/airflow # Local airflow folder mounted into container
      - ./spark/data:/data
    ports:
      - "8080:8080"
    entrypoint: >
      bash -c '
        mkdir -p /airflow/app/logs
        export PYTHONPATH="/airflow/dags:$PYTHONPATH"
        
        # Initialize Airflow DB
        airflow db init
        
        # Create default Airflow user
        airflow users create --username ${_AIRFLOW_WWW_USER_USERNAME:-airflow} \
          --firstname Admin --lastname User --role Admin --email admin@example.com \
          --password ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
        
        # Import connections from connections.json
        if [ -f "/config/airflow/connections.json" ]; then
          echo "Importing connections from connections.json..."
          python /config/airflow/import_connections.py
        else
          echo "No connections.json file found, skipping connection import."
        fi

        # Import variables from variables.json
        if [ -f "/config/airflow/variables.json" ]; then
          echo "Importing variables from variables.json..."
          airflow variables import /config/airflow/variables.json
        else
          echo "No variables.json file found, skipping variables import."
        fi
        
        # Start Supervisor to run multiple Airflow services
        exec supervisord -c /etc/supervisor/conf.d/supervisord.conf
      '

  postgres:
    image: postgres:15.8
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - ./postgres_data:/docker-entrypoint-initdb.d # Mount custom SQL scripts here
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 30s
      retries: 3
      start_period: 20s

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
      args:
        SPARK_VERSION: "3.5.1"
    container_name: spark-master
    ports:
      - "8082:8080" # Spark UI
      - "7077:7077" # Spark Master port
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master # Set Spark master host explicitly
      - SPARK_NO_DAEMONIZE=true
      - SPARK_DEPLOY_RECOVERY_MODE=NONE # Set this in the worker environment
    volumes:
      - ./spark/data:/data
      - ./spark/logs:/data/spark-logs
    entrypoint: [ "/opt/bitnami/spark/sbin/start-master.sh" ]

  spark-worker:
    image: bitnami/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_LOG_DIR=/data/spark-logs
      - SPARK_DEPLOY_RECOVERY_MODE=NONE
    volumes:
      - ./spark/data:/data
      - ./spark/logs:/data/spark-logs
    ports:
      - "8081:8081"

  spark-history-server:
    build:
      context: .
      dockerfile: Dockerfile.spark
      args:
        SPARK_VERSION: "3.5.1"
    container_name: spark-history-server
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/data/spark-logs
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./spark/logs:/data/spark-logs
    ports:
      - "18080:18080" # Spark History Server UI
    entrypoint: [ "/opt/bitnami/spark/sbin/start-history-server.sh" ]

volumes:
  postgres_data: