  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
      args:
        SPARK_VERSION: "3.5.1"
    container_name: spark-master
    ports:
      - "8080:8080" # Spark UI
      - "7077:7077" # Spark Master port
    # extra_hosts:
    #   - "spark-master:172.23.0.3"
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master # Explicitly set Spark master host
      - SPARK_NO_DAEMONIZE=true
      - SPARK_DEPLOY_RECOVERY_MODE=NONE # Set this in the worker environment
    volumes:
      - ./spark/data:/data
      - ./spark/python_code:/usr/local/spark/python_code
    entrypoint: [ "/opt/bitnami/spark/sbin/start-master.sh" ]

  spark-worker:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.spark
    #   args:
    #     SPARK_VERSION: "3.5.1"
    image: bitnami/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_LOG_DIR=/data/spark-logs
      - SPARK_DEPLOY_RECOVERY_MODE=NONE
    volumes:
      - ./spark/data:/data
      - ./spark/data/spark-logs:/data/spark-logs
    ports:
      - "8081:8081"
    # extra_hosts:
    #   - "spark-master:172.23.0.3"
    # entrypoint: [ "/opt/bitnami/spark/sbin/start-worker.sh", spark://spark-master:7077 ]

  spark-history-server:
    build:
      context: .
      dockerfile: Dockerfile.spark
      args:
        SPARK_VERSION: "3.5.1"
    container_name: spark-history-server
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/data/spark-logs
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./spark/data/spark-logs:/data/spark-logs
    ports:
      - "18080:18080" # Spark History Server UI
    entrypoint: [ "/opt/bitnami/spark/sbin/start-history-server.sh" ]

